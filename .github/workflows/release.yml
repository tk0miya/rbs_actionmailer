name: Release
on:
  push:
    branches:
      - main
    paths:
      - 'lib/rbs_actionmailer/version.rb'
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Ruby
        uses: ruby/setup-ruby@8e41b362d2589a22a44c1cfa214b3c83052c195b # v1.318.0
        with:
          ruby-version: ruby
          # Skip bundler cache to avoid the cache-poisoning attack at release time:
          # a poisoned cache written from a PR could otherwise be reused here
          # and end up shipped to RubyGems.
          # See https://docs.zizmor.sh/audits/#cache-poisoning
          bundler-cache: false
      - name: Install dependencies
        run: bundle install
      - name: Publish to RubyGems
        uses: rubygems/release-gem@052cc82692552de3ef2b81fd670e41d13cba8092 # v1.4.0
