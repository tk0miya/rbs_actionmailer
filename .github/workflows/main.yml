name: Ruby

on:
  push:
    branches:
      - main

  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    name: Ruby ${{ matrix.ruby }}
    strategy:
      matrix:
        ruby:
          - '3.3'
          - '3.4'
          - '4.0'

    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      with:
        persist-credentials: false
    - name: Set up Ruby
      uses: ruby/setup-ruby@12fd324f1d0b43274fdc8130f6980590a667c455 # v1.312.0
      with:
        ruby-version: ${{ matrix.ruby }}
        bundler-cache: true
    - name: Set rbs collection up
      run: bundle exec rbs collection install --frozen
    - name: Run the default task
      run: bundle exec rake
    - name: Run rspec
      run: bundle exec rspec
    - name: Run rbs validate
      run: bundle exec rbs -Isig validate
    - name: Run steep check
      run: bundle exec steep check
